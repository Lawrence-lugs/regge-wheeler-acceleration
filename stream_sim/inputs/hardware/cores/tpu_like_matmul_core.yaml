name: tpu_like_matmul_core
type: compute

memories:
  rf_local:
    # Size is in bits: 64 KB local RF.
    size: 524288
    r_cost: 0.09
    w_cost: 0.09
    area: 0
    latency: 1
    operands: [I1, I2, O]
    ports:
      - name: rw_port_1
        type: read_write
        bandwidth_min: 256
        bandwidth_max: 256
        allocation:
          - I1, fh
          - I1, tl
          - I2, fh
          - I2, tl
          - O, fh
          - O, tl
          - O, fl
          - O, th
    served_dimensions: [D1, D2]

operational_array:
  unit_energy: 0.05
  unit_area: 1
  dimensions: [D1, D2]
  sizes: [16, 16]

dataflows:
  D1:
    - K, 16
  D2:
    - C, 16
